<!DOCTYPE html>
<html>
<head>
  <title>URL Tracking - AI Smart Lens</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h2>AI Smart Lens</h2>
</header>

<div class="tool-container">

  <div style="margin-bottom:20px;">
    <input type="text" id="videoURL" placeholder="Paste video URL" style="width:300px;">
    <button onclick="loadURL()">Load URL</button>
  </div>

  <div class="video-wrapper">
    <video id="video" playsinline style="display:none"></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="fps">FPS: 0</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script src="app.js"></script>
<h1 style="font-size: 100px; text-align: center;">Coming soon</h1>
</body>
</html>
